<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HERMES PIA{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/methodos.css') }}">
</head>
<body>
  {% if 'test.' in request.host %}
  <div class="env-banner env-banner--test">&#9888; Testsystem &mdash; test.hermespia.ch</div>
  {% elif 'int.' in request.host %}
  <div class="env-banner env-banner--int">&#9432; Integrationssystem &mdash; int.hermespia.ch</div>
  {% endif %}
  <header><strong>HERMES PIA</strong> &mdash; vom Gespraech zum strukturierten Ergebnis</header>
  <main class="{% block main_class %}{% endblock %}">{% block content %}{% endblock %}</main>
</body>
</html>
