# =====================================================================
# Methodenmodell: HERMES 2022 - Projektinitialisierungsauftrag (PIA)
# =====================================================================
# Dies ist die Konfiguration, die HERMES PIA antreibt ("Konfiguration vor
# Programmierung"). Sie beschreibt die Struktur des Zieldokuments,
# welche Felder erfragt werden, welche Tabellen mit welchen Spalten
# existieren und welche kontrollierten Vokabulare gelten.
#
# Abgeleitet 1:1 aus der oeffentlichen HERMES-Vorlage
#   methods/hermes_pia/template/projektinitialisierungsauftrag.dotx
#
# Spaeter: weitere Methoden = weitere Dateien dieser Art, kein Codeumbau.

method:
  id: hermes_pia
  name: "Projektinitialisierungsauftrag"
  framework: "HERMES 2022"
  language: de
  description: >
    Der Projektinitialisierungsauftrag bildet die verbindliche Grundlage
    fuer die Freigabe der Phase Initialisierung. Er ist die Vereinbarung
    zwischen Auftraggeber und Projektleiter fuer die Phase Initialisierung.
  template: "template/projektinitialisierungsauftrag.dotx"

# ---------------------------------------------------------------------
# Kontrollierte Vokabulare (Auswahlfelder der Vorlage)
# ---------------------------------------------------------------------
vocabularies:
  zielkategorie: ["Systemziel", "Vorgehensziel"]
  prioritaet: ["Tief", "Mittel", "Hoch", "Muss"]
  eintrittswahrscheinlichkeit: ["Tief", "Mittel", "Hoch"]
  auswirkungsgrad: ["Tief", "Mittel", "Hoch"]
  dokument_status: ["in Arbeit", "in Pruefung", "freigegeben"]
  klassifizierung: ["Nicht klassifiziert", "Intern", "Vertraulich", "Geheim"]

# ---------------------------------------------------------------------
# Metadaten / Deckblatt
# ---------------------------------------------------------------------
metadata_fields:
  - { id: projektname,        label: "Projektname",                required: true }
  - { id: projektnummer,      label: "Projektnummer",              required: false }
  - { id: verwaltungseinheit, label: "Verwaltungseinheit",         required: true }
  - { id: geschaeftsbereich,  label: "Geschaeftsbereich",          required: false }
  - { id: autor,              label: "Autor/-in",                  required: false }
  - { id: projektleiter,      label: "Projektleiter/in",           required: true }
  - { id: auftraggeber,       label: "Auftraggeber/in",            required: true }
  - { id: version,            label: "Version",                    required: false, default: "0.1" }
  - { id: status,             label: "Dokument Status",            required: false, vocabulary: dokument_status, default: "in Arbeit" }
  - { id: klassifizierung,    label: "Klassifizierung",            required: false, vocabulary: klassifizierung, default: "Nicht klassifiziert" }

# ---------------------------------------------------------------------
# Abschnitte des Dokuments
#
# type:
#   standard_text  - fester HERMES-Boilerplate, nicht erfragt
#   free_text      - Fliesstext, wird im Interview erarbeitet
#   table          - strukturierte Tabelle mit definierten Spalten
#
# Spaltentyp 'select' verweist auf ein Vokabular oben.
# 'gap_check: true' markiert Abschnitte, fuer die HERMES PIA den
#   Referenzkatalog heranzieht und aktiv nachfragt.
# ---------------------------------------------------------------------
sections:

  - id: einleitung_zweck
    number: "0.1"
    title: "Ziel und Zweck des Dokuments"
    type: standard_text
    required: false
    standard_text: >
      Der Projektinitialisierungsauftrag bildet die verbindliche Grundlage
      fuer die Freigabe der Phase Initialisierung. Es handelt sich um die
      Vereinbarung zwischen dem Auftraggeber und dem Projektleiter fuer die
      Phase Initialisierung. Informationen und Daten in diesem Dokument
      beziehen sich lediglich auf die Initialisierungsphase.

  - id: ausgangslage
    number: "1"
    title: "Ausgangslage"
    type: free_text
    required: true
    interview:
      intent: "Den Anlass und Kontext fuer die Projektinitialisierung erfassen."
      questions:
        - "Was ist der konkrete Anlass fuer dieses Vorhaben?"
        - "Welches Problem oder welche Chance soll adressiert werden?"
        - "Was passiert, wenn nichts unternommen wird?"
      completeness:
        - "Anlass ist klar benannt"
        - "Bezug zur Stammorganisation / zum Auftraggeber ist erkennbar"

  - id: referenzierte_dokumente
    number: "0.2"
    title: "Referenzierte Dokumente"
    type: table
    required: false
    columns:
      - { id: nr,     label: "Nr." }
      - { id: name,   label: "Name" }
      - { id: link,   label: "Nummer / Link" }

  - id: mitgeltende_unterlagen
    number: "0.3"
    title: "Mitgeltende Unterlagen"
    type: table
    required: false
    columns:
      - { id: name, label: "Name" }
      - { id: link, label: "Nummer / Link" }

  - id: definitionen
    number: "0.4"
    title: "Definitionen und Abkuerzungen"
    type: table
    required: false
    columns:
      - { id: abkuerzung, label: "Abkuerzung" }
      - { id: bedeutung,  label: "Bedeutung" }
    defaults:
      - { abkuerzung: "CHF", bedeutung: "Schweizer Franken" }
      - { abkuerzung: "IT",  bedeutung: "Informationstechnologie" }
      - { abkuerzung: "PT",  bedeutung: "Personentage" }
      - { abkuerzung: "AG",  bedeutung: "Auftraggeber" }
      - { abkuerzung: "PL",  bedeutung: "Projektleiter" }

  - id: ziele
    number: "2.1"
    title: "Ziele der Phase Initialisierung"
    type: table
    required: true
    gap_check: true
    columns:
      - { id: nr,          label: "Nr." }
      - { id: kategorie,   label: "Kategorie", type: select, vocabulary: zielkategorie }
      - { id: beschreibung, label: "Beschreibung" }
      - { id: messgroesse, label: "Messgroesse" }
      - { id: prioritaet,  label: "Prioritaet", type: select, vocabulary: prioritaet }
    interview:
      intent: "Ziele der Initialisierungsphase mit Messgroessen festhalten."
      questions:
        - "Welche Ziele soll die Phase Initialisierung erreichen?"
        - "Woran wird der Erfolg gemessen (Messgroesse)?"
      completeness:
        - "Mindestens ein Systemziel und ein Vorgehensziel vorhanden"
        - "Jedes Ziel hat eine Messgroesse"

  - id: rahmenbedingungen
    number: "2.2"
    title: "Rahmenbedingungen"
    type: table
    required: true
    columns:
      - { id: nr,          label: "Nr." }
      - { id: vorgaben,    label: "Vorgaben" }
      - { id: beschreibung, label: "Beschreibung" }
    defaults:
      - { nr: "01", vorgaben: "Anwendung von HERMES", beschreibung: "Version HERMES 2022" }

  # Ergebnisse/Termine werden VOR dem Personalaufwand erhoben: erst wenn die
  # Lieferergebnisse (inkl. Beschaffungsanalyse/Prototyp) feststehen, sind die
  # dafuer noetigen Rollen (z.B. Anwendervertreter, Entwickler) bekannt.
  - id: termine
    number: "4.1"
    title: "Ergebnisse und Termine"
    type: table
    required: true
    gap_check: true
    columns:
      - { id: nr,         label: "Nr." }
      - { id: ergebnis,   label: "Lieferergebnisse (abnahmerelevant)" }
      - { id: termin,     label: "Liefertermin" }
      - { id: abnahme,    label: "Abnahme durch (Rolle)" }
      - { id: pruefmethode, label: "Pruefmethode" }
    interview:
      intent: "Abnahmerelevante Lieferergebnisse der Initialisierung terminieren."
      completeness:
        - "Geplantes Enddatum der Phase Initialisierung ist gesetzt"

  - id: personalaufwand
    number: "3.1"
    title: "Personalaufwand"
    type: table
    required: true
    columns:
      - { id: rolle,   label: "Rolle" }
      - { id: name,    label: "Name" }
      - { id: aufwand, label: "Aufwand in PT" }

  - id: sachmittel
    number: "3.2"
    title: "Sachmittel"
    type: table
    required: false
    columns:
      - { id: bezeichnung, label: "Bezeichnung" }
      - { id: beschreibung, label: "Beschreibung" }
      - { id: quantitaet,  label: "Quantitaet" }

  - id: kosten
    number: "3.3"
    title: "Kosten (in CHF inkl. MwSt.)"
    type: table
    required: true
    columns:
      - { id: phase,  label: "Phase" }
      - { id: betrag, label: "Betrag" }

  - id: projektorganisation
    number: "5"
    title: "Projektorganisation und Personal"
    type: table
    required: true
    columns:
      - { id: rolle_person, label: "Rolle / Person" }
      - { id: monat_1, label: "Monat 1" }
      - { id: monat_2, label: "Monat 2" }
      - { id: monat_3, label: "Monat 3" }
      - { id: monat_4, label: "Monat 4" }
      - { id: monat_5, label: "Monat 5" }
      - { id: monat_6, label: "Monat 6" }
      - { id: monat_7, label: "Monat 7" }
      - { id: monat_8, label: "Monat 8" }
      - { id: monat_9, label: "Monat 9" }
      - { id: bestaetigung, label: "Bestaetigung Vorgesetzter" }

  - id: kommunikation
    number: "6"
    title: "Kommunikation"
    type: table
    required: false
    columns:
      - { id: empfaenger,   label: "Empfaenger" }
      - { id: verantwortlich, label: "Verantwortlich" }
      - { id: inhalt,       label: "Ziel / Inhalt" }
      - { id: medium,       label: "Mittel / Medium" }
      - { id: termin,       label: "Termin" }

  - id: risiken
    number: "7"
    title: "Risiken"
    type: table
    required: true
    gap_check: true
    columns:
      - { id: nr,          label: "Nr." }
      - { id: beschreibung, label: "Risikobeschreibung" }
      - { id: ew,          label: "Eintrittswahrscheinlichkeit", type: select, vocabulary: eintrittswahrscheinlichkeit }
      - { id: ag,          label: "Auswirkungsgrad", type: select, vocabulary: auswirkungsgrad }
      - { id: risikozahl,  label: "Risikozahl", computed: "ew * ag" }
      - { id: massnahmen,  label: "Massnahmen" }
      - { id: verantwortung, label: "Verantwortung" }
      - { id: termin,      label: "Termin" }
    interview:
      intent: "Risiken der Phase Initialisierung erfassen und bewerten."
      completeness:
        - "Typische Risiken des Projekttyps sind adressiert oder bewusst ausgeschlossen"
