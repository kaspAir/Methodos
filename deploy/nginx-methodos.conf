# Nginx-Konfiguration für hermespia.ch
# Speicherpfad auf dem Server: /etc/nginx/sites-available/hermespia
# Symlink:  ln -s /etc/nginx/sites-available/hermespia /etc/nginx/sites-enabled/
#
# TLS-Zertifikate via Let's Encrypt (Certbot):
#   certbot --nginx -d hermespia.ch -d www.hermespia.ch -d test.hermespia.ch

# ── Produktion: hermespia.ch ─────────────────────────────────────────────
server {
    listen 80;
    server_name hermespia.ch www.hermespia.ch;
    return 301 https://hermespia.ch$request_uri;
}

server {
    listen 443 ssl;
    server_name hermespia.ch www.hermespia.ch;

    # TLS (wird von Certbot ergänzt)
    ssl_certificate     /etc/letsencrypt/live/hermespia.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermespia.ch/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Grosse Downloads (DOCX-Generierung)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Timeout fuer LLM-Calls (koennen 30-60s dauern)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── Test: test.hermespia.ch ───────────────────────────────────────────────
server {
    listen 80;
    server_name test.hermespia.ch;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name test.hermespia.ch;

    ssl_certificate     /etc/letsencrypt/live/hermespia.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermespia.ch/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Passwortschutz fuer Test-Umgebung (empfohlen)
    # auth_basic           "Methodos Test";
    # auth_basic_user_file /etc/nginx/.htpasswd-methodos;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
