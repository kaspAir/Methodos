# Nginx-Konfiguration für phronesis.swiss – Methodos
# Speicherpfad auf dem Server: /etc/nginx/sites-available/methodos
# Symlink:  ln -s /etc/nginx/sites-available/methodos /etc/nginx/sites-enabled/
#
# TLS-Zertifikate via Let's Encrypt (Certbot):
#   certbot --nginx -d methodos.phronesis.swiss -d test.methodos.phronesis.swiss

# ── Produktion: methodos.phronesis.swiss ─────────────────────────────────
server {
    listen 80;
    server_name methodos.phronesis.swiss;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name methodos.phronesis.swiss;

    # TLS (wird von Certbot ergänzt)
    ssl_certificate     /etc/letsencrypt/live/methodos.phronesis.swiss/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/methodos.phronesis.swiss/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Grosse Uploads (DOCX-Vorlagen)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Timeout für LLM-Calls (können 30-60s dauern)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── Test: test.methodos.phronesis.swiss ──────────────────────────────────
server {
    listen 80;
    server_name test.methodos.phronesis.swiss;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name test.methodos.phronesis.swiss;

    ssl_certificate     /etc/letsencrypt/live/methodos.phronesis.swiss/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/methodos.phronesis.swiss/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Passwortschutz für Test-Umgebung (optional, empfohlen)
    # auth_basic           "Methodos Test";
    # auth_basic_user_file /etc/nginx/.htpasswd-methodos-test;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
